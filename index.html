<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JEE Main Mock Test</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  
  <header>
    <span>JEE Main — Mock Test</span>
    <span id="timer">03:00:00</span>
  </header>

  
  <div id="subject-tabs">
    <button class="tab active" data-subject="physics">Physics</button>
    <button class="tab" data-subject="chemistry">Chemistry</button>
    <button class="tab" data-subject="maths">Maths</button>
  </div>

  
  <div id="main">

    
    <div id="question-area">
      <p id="question-number">Question 1</p>
      <p id="question-text">Loading...</p>

      <div id="options">
        <button class="option" data-index="0">A. Option 1</button>
        <button class="option" data-index="1">B. Option 2</button>
        <button class="option" data-index="2">C. Option 3</button>
        <button class="option" data-index="3">D. Option 4</button>
      </div>

      <div id="controls">
        <button id="mark-review">Mark for Review</button>
        <button id="clear">Clear</button>
        <button id="prev">Previous</button>
        <button id="next">Next</button>
      </div>
    </div>

    
    <div id="palette">
      <h3>Question Palette</h3>
      <div id="palette-grid">
        
      </div>
      <div id="legend">
        <span class="not-visited">Not Visited</span>
        <span class="not-answered">Not Answered</span>
        <span class="answered">Answered</span>
        <span class="marked">Marked</span>
      </div>
      <button id="submit-btn">Submit Test</button>
    </div>

  </div>
  <script src="js/auth.js" type="module"></script>
  <script src="js/questions.js"></script>
  <script src="js/test.js" type="module"></script>
</body>
</html>
