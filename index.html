<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JEE Main Mock Test</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header">
    <div id="candidate-info">
      <img src="" alt="candidate" id="candidate-img"/>
      <div>
        <p>Candidate Name : <span id="candidate-name">Loading...</span></p>
        <p>Exam Name : <span id="exam-name">JEE-Main</span></p>
        <p>Remaining Time : <span id="timer">02:59:54</span></p>
      </div>
    </div>
    <div id="lang-select">
      <select>
        <option>English</option>
        <option>Hindi</option>
      </select>
    </div>
  </div>

  <div id="subject-tabs">
    <button class="tab active" data-subject="physics">Physics</button>
    <button class="tab" data-subject="chemistry">Chemistry</button>
    <button class="tab" data-subject="maths">Maths</button>
  </div>

  <div id="main">

    <div id="question-area">
      <h3 id="question-number">Question 1:</h3>
      <hr id="question-divider">
      <div id="question-text">Loading...</div>

      <p id="options-label">Options :</p>
      <div id="options">
        <label class="option"><input type="radio" name="option" data-index="0"/> <span>Option A</span></label>
        <label class="option"><input type="radio" name="option" data-index="1"/> <span>Option B</span></label>
        <label class="option"><input type="radio" name="option" data-index="2"/> <span>Option C</span></label>
        <label class="option"><input type="radio" name="option" data-index="3"/> <span>Option D</span></label>
      </div>
      <hr id="question-divider">
      <div id="action-buttons">
        <button id="save-next" class="btn green">Save & Next</button>
        <button id="clear" class="btn white">Clear</button>
        <button id="save-mark" class="btn orange">Save & Mark for Review</button>
        <button id="mark-next" class="btn blue">Mark for Review & Next</button>
      </div>

      <div id="nav-buttons">
      <div><button id="prev" class="btn white">&lt;&lt; Back</button>
        <button id="next" class="btn white">Next &gt;&gt;</button>
      </div>
        <button id="submit-btn" class="btn green">Submit</button>
      </div>
    </div>

    <div id="palette">

      <div id="legend">
        <div class="legend-item">
          <span class="circle gray"></span><p>Not Visited</p>
        </div>
        <div class="legend-item">
          <span class="circle orange"></span><p>Not Answered</p>
        </div>
        <div class="legend-item">
          <span class="circle green"></span><p>Answered</p>
        </div>
        <div class="legend-item">
          <span class="circle blue"></span><p>Marked for Review</p>
        </div>
        <div class="legend-item">
          <span class="circle red"></span><p>Answered & Marked</p>
        </div>
      </div>

      
      <div id="palette-grid">
       
      </div>

    </div>

  </div>

  <div id="footer">
    <p style="color:white">© All Rights Reserved - National Testing Agency</p>
  </div>

  <script src="js/auth.js" type="module"></script>
  <script src="js/questions.js" type="module"></script>
  <script src="js/test.js" type="module"></script>

</body>
</html>
