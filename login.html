<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LOGIN</title>
  
  <link rel="stylesheet" href="css/style.css" />
  <style>
  body {
    background-color: #092a4e !important;
  }
  </style>
</head>
<body>
  <div id="login-container">
    <h2 id="heading">Login</h2>
    <hr />
    <form id="login-form">
      <h3 class="credetials">Username</h3>  
      <input type="text" id="username" placeholder="49.37.75.213" required />
      <h3 class="credetials">Password</h3>
      <input type="password" id="password" placeholder="**********" required />
      <button type="submit" id="login-button">LOGIN</button>
      <h3 id="necessary">Click login to proceed!</h3>
    </form>
  </div>
  <script src="js/login.js" type="module"></script>
</body>
</html>
